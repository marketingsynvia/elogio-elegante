<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Telão · Mural da Festa · Arraiá Synvia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --green-deep:#1a8f41;
  --fest-forest:#16352a; --fest-forest2:#0f2a20; --fest-green:#36a847; --fest-yellow:#f4b81b;
  --fest-orange:#e8590c; --fest-navy:#2b3a6b; --fest-cream:#f6f1df;
  --gold:#e8a300; --gold-deep:#b5590c; --gold-lite:#ffd257;
  --ink:#22201f; --font:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);}
body{
  background:
    radial-gradient(90% 60% at 50% 120%, rgba(232,89,12,.4), rgba(0,0,0,0) 62%),
    radial-gradient(130% 100% at 50% -10%, #33507f 0%, var(--fest-navy) 38%, var(--fest-forest) 100%);
  color:#fff;
}
body.transparent{background:transparent;}
/* --- decoração de festa --- */
.bokeh{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.bokeh i{position:absolute;border-radius:50%;background:radial-gradient(circle,#fff,rgba(255,255,255,0));opacity:.5;animation:tw 3.5s ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:.7;transform:scale(1.1)}}
.transparent .bokeh,.transparent .bunting{display:none;}
.bunting{position:fixed;left:0;width:100%;height:46px;display:flex;justify-content:center;pointer-events:none;z-index:6;}
.bunting.top{top:0;} .bunting.bot{bottom:0;transform:scaleY(-1);}
.flag{width:58px;height:44px;clip-path:polygon(0 0,100% 0,50% 100%);margin:0 -1px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.35));animation:sway 3.6s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(5px) rotate(1.5deg)}}
.corner{position:fixed;pointer-events:none;z-index:1;filter:drop-shadow(0 8px 18px rgba(0,0,0,.4));}
.corner.fire{left:2.5vw;bottom:2.5vh;width:min(13vw,150px);animation:flick 1.6s ease-in-out infinite;transform-origin:bottom center;}
.corner.corn{right:2.8vw;bottom:2vh;width:min(9vw,110px);transform:rotate(8deg);}
.corner.hat{left:2.5vw;top:3vh;width:min(12vw,150px);transform:rotate(-7deg);}
.corner.sun{right:2.5vw;top:3vh;width:min(11vw,140px);transform:rotate(8deg);}
.corner.lan{left:2vw;top:40vh;width:min(7.5vw,90px);}
.corner.cac{right:2.2vw;bottom:22vh;width:min(9vw,120px);}
@keyframes flick{0%,100%{transform:scale(1) rotate(-1deg);filter:drop-shadow(0 0 22px rgba(244,184,27,.5))}50%{transform:scale(1.05) rotate(1deg);filter:drop-shadow(0 0 36px rgba(232,89,12,.75))}}
/* cantos (PNGs da identidade) aparecem mesmo com fundo transparente */
/* --- painel de mensagens (caixa de recados) --- */
.app{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;width:min(72vw,1040px);height:min(84vh,880px);background:var(--fest-cream);border-radius:30px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.55),0 0 0 8px rgba(255,255,255,.9),0 0 0 16px rgba(54,168,71,.55);transition:transform .6s cubic-bezier(.2,.8,.2,1),filter .5s ease,opacity .5s ease;}
body.live-on .app{transform:translate(-50%,-50%) scale(.93);filter:blur(5px) brightness(.7) saturate(.85);}
.app-top{flex:none;height:12px;background:repeating-linear-gradient(45deg,#cf5a2b 0 14px,#f0c04a 14px 28px,#3a9440 28px 42px,#8bbf3c 42px 56px);}
.app-bar{flex:none;display:flex;align-items:center;gap:16px;padding:18px 26px;background:linear-gradient(100deg,var(--fest-forest),#1f4635);color:#fff;border-bottom:3px solid rgba(0,0,0,.14);}
.app-ava{width:56px;height:56px;border-radius:16px;background:var(--fest-yellow);display:grid;place-items:center;font-size:32px;flex:none;box-shadow:0 4px 10px rgba(0,0,0,.3);}
.app-meta{display:flex;flex-direction:column;line-height:1.15;}
.app-name{font-size:26px;font-weight:800;letter-spacing:.2px;}
.app-sub{font-size:15px;color:#bfe6c8;display:flex;align-items:center;gap:8px;font-weight:600;}
.dot{width:10px;height:10px;border-radius:50%;background:#4be07a;animation:on 1.6s ease-out infinite;}
@keyframes on{0%{box-shadow:0 0 0 0 rgba(75,224,122,.6)}100%{box-shadow:0 0 0 10px rgba(75,224,122,0)}}
.app-count{margin-left:auto;font-size:15px;font-weight:800;color:#3a2600;background:var(--fest-yellow);padding:7px 15px;border-radius:999px;white-space:nowrap;}
.feed{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:18px;padding:22px 28px 8px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0%,#fffef8,var(--fest-cream));}
.foot{flex:none;display:flex;align-items:center;gap:11px;padding:12px 28px 18px;color:#8a7a63;font-size:16px;font-style:italic;font-weight:600;}
.typing{display:inline-flex;gap:5px;}
.typing i{width:8px;height:8px;border-radius:50%;background:#c9b58f;animation:ty 1.2s ease-in-out infinite;}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes ty{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}
/* --- balões de recado --- */
.bubble{display:flex;align-items:flex-end;gap:14px;transform-origin:left bottom;}
.bubble.pop{animation:pop .55s cubic-bezier(.2,1.35,.35,1) both;}
@keyframes pop{0%{opacity:0;transform:translateY(28px) scale(.82)}100%{opacity:1;transform:translateY(0) scale(1)}}
.bubble.leave{animation:leave .48s ease forwards;}
@keyframes leave{to{opacity:0;transform:translateY(-16px) scale(.96);margin-top:-14px}}
.b-ava{position:relative;width:60px;height:60px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:30px;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,.22),inset 0 0 0 4px rgba(255,255,255,.65);}
.bub{position:relative;background:#fff;border-radius:20px 20px 20px 6px;padding:15px 24px 14px;max-width:calc(100% - 92px);box-shadow:0 8px 20px rgba(34,32,31,.1);}
.bub::before{content:"";position:absolute;left:-9px;bottom:0;width:16px;height:18px;background:#fff;clip-path:polygon(100% 0,100% 100%,0 100%);}
.b-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.b-to{font-size:15px;color:#8a7a63;font-weight:700;}
.b-name{font-size:24px;font-weight:800;color:var(--fest-forest);}
.b-chip{font-size:14px;font-weight:700;color:#fff;background:var(--fest-green);padding:3px 12px;border-radius:999px;}
.b-msg{font-size:26px;line-height:1.3;color:#2e2721;font-weight:600;text-wrap:pretty;}
.b-de{margin-top:8px;font-size:15px;font-style:italic;color:#a8967c;}
.b-photo{display:block;width:auto;max-width:100%;max-height:34vh;border-radius:12px;margin-top:4px;box-shadow:0 6px 16px rgba(0,0,0,.25);}
.b-tag{display:inline-block;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5a3d00;background:linear-gradient(100deg,#f4b81b,#ffd257);border-radius:999px;padding:3px 11px;margin-bottom:8px;}
.bubble.destaque .bub{background:linear-gradient(165deg,#fffaf0,#ffeec2);border:2px solid #e8a300;box-shadow:0 10px 26px rgba(180,120,10,.4);}
.bubble.destaque .bub::before{background:#ffeec2;}
.bubble.destaque .b-name{color:#5a3d00;}
/* --- takeover: elogio ao vivo --- */
.live{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease;}
.live.on{opacity:1;}
.live-bg{position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 45%,rgba(244,184,27,.22),rgba(11,20,16,.72) 70%);}
.transparent .live-bg{background:radial-gradient(60% 60% at 50% 45%,rgba(244,184,27,.18),rgba(11,20,16,.45) 72%);}
.livecard{position:relative;width:min(58vw,900px);max-height:94vh;background:linear-gradient(165deg,#fffaf0,#ffeec2);color:#4a3400;border-radius:32px;padding:38px 52px 36px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 7px rgba(255,255,255,.95),0 0 0 16px var(--gold),0 0 90px rgba(244,184,27,.7);transform:scale(.4) translateY(40px) rotate(-4deg);opacity:0;}
.livecard.in{animation:burst .8s cubic-bezier(.16,1.3,.3,1) forwards;}
@keyframes burst{0%{opacity:0;transform:scale(.4) translateY(40px) rotate(-4deg)}60%{opacity:1;transform:scale(1.04) translateY(0) rotate(1.5deg)}100%{opacity:1;transform:scale(1) translateY(0) rotate(0)}}
.livecard.out{animation:eject .55s ease forwards;}
@keyframes eject{to{opacity:0;transform:scale(.86) translateY(-54px)}}
.livecard.feat{background:linear-gradient(165deg,#f4fff2,#d9f6df);color:#12321f;box-shadow:0 40px 100px rgba(0,0,0,.55),0 0 0 7px rgba(255,255,255,.95),0 0 0 16px var(--fest-green),0 0 80px rgba(54,168,71,.6);}
.livecard::before{content:"";position:absolute;top:-15px;left:30px;right:30px;height:16px;border-radius:8px;background:repeating-linear-gradient(45deg,var(--gold) 0 14px,var(--fest-yellow) 14px 28px,var(--gold-lite) 28px 42px,var(--fest-orange) 42px 56px);}
.livecard.feat::before{background:repeating-linear-gradient(45deg,var(--fest-orange) 0 14px,var(--fest-yellow) 14px 28px,var(--fest-green) 28px 42px,var(--fest-navy) 42px 56px);}
.shimmer{position:absolute;inset:0;border-radius:32px;overflow:hidden;pointer-events:none;}
.shimmer::after{content:"";position:absolute;top:-60%;left:-70%;width:45%;height:220%;transform:rotate(18deg);background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.85),rgba(255,255,255,0));animation:sweep 2.3s linear infinite;}
@keyframes sweep{0%{left:-70%}100%{left:150%}}
.tremor{animation:tremor .6s ease;}
@keyframes tremor{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}30%{transform:translateX(9px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.lv-ribbon{position:relative;z-index:4;margin:0 auto 6px;width:max-content;padding:9px 28px;border-radius:30px;font-weight:800;font-size:22px;letter-spacing:.5px;background:linear-gradient(100deg,var(--gold),var(--gold-lite));color:#5a3d00;box-shadow:0 8px 20px rgba(244,184,27,.6);animation:pulse 1.05s ease-in-out infinite;}
.lv-ribbon.feat{background:var(--fest-green);color:#fff;box-shadow:0 8px 18px rgba(54,168,71,.5);animation:none;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.lv-ava{position:relative;z-index:4;width:116px;height:116px;margin:12px auto 4px;border-radius:50%;display:grid;place-items:center;font-size:58px;color:#fff;box-shadow:0 12px 26px rgba(0,0,0,.3),inset 0 0 0 6px rgba(255,255,255,.7);transform:scale(0);}
.lv-ava.pop{animation:avapop .55s cubic-bezier(.2,1.5,.4,1) forwards;}
@keyframes avapop{to{transform:scale(1)}}
.lv-ava .hat{position:absolute;top:-36px;left:50%;transform:translateX(-50%) rotate(-13deg);font-size:54px;}
.lv-to{font-size:20px;color:#8a7a63;letter-spacing:1px;margin-top:14px;}
.livecard.feat .lv-to{color:#4c6b56;}
.lv-name{font-size:46px;font-weight:800;line-height:1.04;margin-top:2px;text-wrap:balance;}
.lv-chip{display:inline-block;margin-top:14px;padding:7px 24px;border-radius:24px;font-size:20px;font-weight:700;background:linear-gradient(100deg,var(--gold),#d99a06);color:#3a2600;}
.livecard.feat .lv-chip{background:var(--fest-green);color:#fff;}
.lv-msg{font-size:31px;line-height:1.3;margin-top:18px;font-weight:600;text-wrap:pretty;}
.lv-msg.short{font-size:40px;}
.lv-de{margin-top:16px;font-size:19px;font-style:italic;opacity:.68;}
.lv-timer{position:absolute;left:30px;right:30px;bottom:14px;height:6px;border-radius:4px;background:rgba(0,0,0,.08);overflow:hidden;}
.lv-timer i{display:block;height:100%;transform-origin:left;background:linear-gradient(90deg,var(--gold),var(--gold-lite));transform:scaleX(0);}
.livecard.feat .lv-timer i{background:linear-gradient(90deg,var(--fest-green),var(--fest-yellow));}
.livephoto{position:relative;height:min(88vh,900px);aspect-ratio:9/16;border-radius:26px;overflow:hidden;background:#0d0d0d;box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 7px rgba(255,255,255,.95),0 0 0 15px var(--gold),0 0 90px rgba(244,184,27,.7);transform:scale(.4) translateY(40px) rotate(-4deg);opacity:0;}
.livephoto.in{animation:burst .8s cubic-bezier(.16,1.3,.3,1) forwards;}
.livephoto.out{animation:eject .55s ease forwards;}
.livephoto img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.lp-ribbon{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:3;padding:8px 22px;border-radius:30px;font-weight:800;font-size:20px;white-space:nowrap;background:linear-gradient(100deg,var(--gold),var(--gold-lite));color:#5a3d00;box-shadow:0 8px 20px rgba(0,0,0,.4);animation:lppulse 1.05s ease-in-out infinite;}
@keyframes lppulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.06)}}
.lp-de{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:34px 20px 16px;text-align:center;color:#fff;font-size:22px;font-weight:700;background:linear-gradient(180deg,transparent,rgba(11,25,18,.72));}
.lp-timer{position:absolute;left:0;bottom:0;z-index:4;height:7px;width:100%;background:rgba(0,0,0,.15);}
.lp-timer i{display:block;height:100%;transform-origin:left;background:linear-gradient(90deg,var(--gold),var(--gold-lite));transform:scaleX(0);}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden;}
.confetti span{position:absolute;top:-20px;width:13px;height:17px;opacity:.95;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}
.fw{position:fixed;pointer-events:none;z-index:44;}
.fw i{position:absolute;left:0;top:0;width:7px;height:7px;border-radius:50%;}
@keyframes spark{0%{opacity:1;transform:rotate(var(--a)) translateY(0) scale(1)}100%{opacity:0;transform:rotate(var(--a)) translateY(-150px) scale(.3)}}
.brand{position:fixed;bottom:14px;left:0;width:100%;text-align:center;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:2px;font-size:15px;z-index:6;}
.transparent .brand{display:none;}
@media (max-aspect-ratio:1/1){.app{width:92vw;height:86vh}.corner.fire{width:22vw}.corner.corn{width:15vw}.livecard{width:88vw;padding:38px 30px 36px}.lv-name{font-size:40px}.lv-msg{font-size:28px}.lv-msg.short{font-size:34px}}
/* ===== MODO CLEAN — overlay p/ Resolume: sem janela central, cantos flutuantes, centro livre ===== */
.clean .app,.clean .bunting,.clean .bokeh,.clean .corner,.clean .brand{display:none!important;}
.clean .live-bg{background:none!important;}
/* dimensionado pro telão 1008x672 (paisagem, baixa-res): duas bolhas cabem embaixo com folga no meio */
.float-msg{position:fixed;z-index:12;width:min(36vw,380px);display:flex;gap:13px;align-items:center;
  background:var(--fest-cream);color:var(--ink);border-radius:18px;padding:13px 18px;
  box-shadow:0 14px 40px rgba(0,0,0,.55);border:3px solid var(--fest-green);
  opacity:0;transform:translateY(14px) scale(.95);transition:opacity .5s ease,transform .5s cubic-bezier(.2,.9,.25,1.25);}
.float-msg.in{opacity:1;transform:none;}
.float-msg.out{opacity:0;transform:translateY(-10px) scale(.97);}
.fm-ava{flex:none;width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:25px;color:#fff;box-shadow:0 5px 12px rgba(0,0,0,.28),inset 0 0 0 3px rgba(255,255,255,.6);}
.fm-body{min-width:0;}
.float-msg .fm-to{font-size:11px;color:#7a6a52;font-weight:800;text-transform:uppercase;letter-spacing:.09em;}
.float-msg .fm-name{font-size:24px;font-weight:800;color:var(--fest-forest);line-height:1.05;}
.float-msg .fm-msg{font-size:18px;line-height:1.24;color:#1c2126;font-weight:700;margin-top:4px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.float-msg .fm-tag{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#5a3d00;background:linear-gradient(100deg,#f4b81b,#ffd257);border-radius:999px;padding:3px 11px;margin-bottom:7px;}
.float-msg.destaque{background:linear-gradient(165deg,#fffaf0,#ffeec2);border-color:#e8a300;}
.float-msg.z2{bottom:5vh;left:2.5vw;}
.float-msg.z3{bottom:5vh;right:2.5vw;}
/* foto assentada no canto (clean) */
.corner-photo{position:fixed;right:2.5vw;bottom:5vh;width:min(16vw,170px);aspect-ratio:9/16;z-index:11;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.6);opacity:0;transform:translateY(24px) scale(.9);transition:opacity .6s ease,transform .7s cubic-bezier(.2,.85,.25,1.15);}
.corner-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.corner-photo.in{opacity:1;transform:none;}
.corner-photo.out{opacity:0;transform:translateY(-12px) scale(.95);}
/* ===== TARJA INFERIOR (v02): uma mensagem por vez, sem sobrepor, fontes proporcionais (vh) ===== */
.tarja{position:fixed;left:0;right:0;bottom:0;z-index:12;display:none;padding:6vh 4vw 4vh;
  background:linear-gradient(180deg,transparent,rgba(11,25,18,.5) 34%,rgba(11,25,18,.9));
  opacity:0;transition:opacity .5s ease;}
.clean .tarja{display:block;}
.tarja.in{opacity:1;}
.tarja .tj-tag{display:none;font-size:2vh;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#5a3d00;background:linear-gradient(100deg,#f4b81b,#ffd257);border-radius:999px;padding:.5vh 1.6vh;margin-bottom:1.2vh;}
.tarja .tj-to{font-size:2vh;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#f4b81b;}
.tarja .tj-name{font-size:4.6vh;font-weight:800;color:#fff;line-height:1.02;margin:.4vh 0 .8vh;text-shadow:0 2px 8px rgba(0,0,0,.55);}
.tarja .tj-msg{font-size:3.3vh;font-weight:700;color:#f3efe4;line-height:1.22;max-width:70%;text-shadow:0 2px 8px rgba(0,0,0,.55);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.clean .corner-photo{z-index:13;bottom:4vh;}
</style>
</head>
<body>
<div class="bokeh" id="bokeh"></div>
<div class="bunting top" id="bTop"></div>
<div class="bunting bot" id="bBot"></div>
<img class="corner fire" alt="" src="assets/fogueira.png" onerror="this.remove()">
<img class="corner corn" alt="" src="assets/milho.png" onerror="this.remove()">
<img class="corner hat" alt="" src="assets/chapeu.png" onerror="this.remove()">
<img class="corner sun" alt="" src="assets/girassol.png" onerror="this.remove()">
<img class="corner cac" alt="" src="assets/cactos.png" onerror="this.remove()">
<img class="corner lan" alt="" src="assets/lanterna.png" onerror="this.remove()">

<div class="app" id="app">
  <div class="app-top"></div>
  <div class="app-bar">
    <div class="app-ava">💌</div>
    <div class="app-meta">
      <div class="app-name">Recados do Arraiá</div>
      <div class="app-sub"><span class="dot"></span> Correio Elegante · online</div>
    </div>
    <div class="app-count" id="count">🤠 Synvia</div>
  </div>
  <div class="feed" id="feed"></div>
  <div class="foot"><span class="typing"><i></i><i></i><i></i></span> recebendo mais recados…</div>
</div>

<div class="live" id="live">
  <div class="live-bg"></div>
  <div class="livecard" id="livecard">
    <div class="shimmer"></div>
    <div class="lv-ribbon" id="lvRibbon">✨ Elogio ao vivo</div>
    <div class="lv-ava" id="lvAva"><span class="hat">🤠</span><span id="lvEmoji">🌽</span></div>
    <div class="lv-to">Para</div>
    <div class="lv-name" id="lvName">—</div>
    <div class="lv-chip" id="lvChip">—</div>
    <div class="lv-msg" id="lvMsg">—</div>
    <div class="lv-de" id="lvDe">—</div>
    <div class="lv-timer"><i id="lvTimer"></i></div>
  </div>
  <div class="livephoto" id="livephoto">
    <div class="lp-ribbon" id="lpRibbon">✨ Foto ao vivo ✨</div>
    <img id="lpImg" alt="" />
    <div class="lp-de" id="lpDe"></div>
    <div class="lp-timer"><i id="lpTimer"></i></div>
  </div>
</div>
<div class="tarja" id="tarja">
  <div class="tj-tag" id="tjTag"></div>

  const anonFoto=foto && !nome;
  const bub=document.createElement('div');bub.className='bub'+(foto?' foto':'');
  if(destaque && !anonFoto){const tag=document.createElement('div');tag.className='b-tag';tag.textContent=item.vencedor?'🏆 vencedor':'✨ ao vivo';bub.append(tag);}
  if(foto){
    if(nome){                                     // identificado: nome em cima
      const head=document.createElement('div');head.className='b-head';
      const to=document.createElement('span');to.className='b-to';to.textContent='Foto de';
      const nm=document.createElement('span');nm.className='b-name';nm.textContent=nome;
      head.append(to,nm);bub.append(head);
    }
    const img=document.createElement('img');img.className='b-photo';img.src=item.fotoUrl||item.foto||'';bub.append(img);
    // anônimo: só a foto, sem nada escrito
  } else {
    const head=document.createElement('div');head.className='b-head';
    const to=document.createElement('span');to.className='b-to';to.textContent='Para';
    const nm=document.createElement('span');nm.className='b-name';nm.textContent=item.para||'Synvia';
    const chip=document.createElement('span');chip.className='b-chip';chip.textContent=item.setor||'Synvia';
    head.append(to,nm,chip);bub.append(head);
    const msg=document.createElement('div');msg.className='b-msg';msg.textContent='“'+item.msg+'”';bub.append(msg);
    const de=document.createElement('div');de.className='b-de';de.textContent=item.de||'';bub.append(de);
  }
  row.append(av,bub);
  feed.appendChild(row);
  requestAnimationFrame(()=>row.classList.add('pop'));
  pop(false);
  if(feed.children.length>MAX){const old=feed.firstChild;old.classList.add('leave');setTimeout(()=>old.remove(),480);}
}

// ---- modo clean: mensagem flutuando num canto (centro fica livre) ----
let fmZone=0;
function floatMsg(item,destaque){
  if(isFotoItem(item)) return;                 // fotos vão pro centro (deliverLive), não flutuam
  const el=document.createElement('div');
  el.className='float-msg z'+(2+(fmZone%2))+(destaque?' destaque':'');fmZone++;   // cantos de baixo (centro livre)
  const ava=document.createElement('div');ava.className='fm-ava';ava.style.background=corDe(item.para);ava.textContent=emojiFor(item.para);el.appendChild(ava);
  const body=document.createElement('div');body.className='fm-body';
  if(destaque){const t=document.createElement('div');t.className='fm-tag';t.textContent=item.vencedor?'🏆 vencedor':'✨ ao vivo';body.appendChild(t);}
  const to=document.createElement('div');to.className='fm-to';to.textContent='Para';body.appendChild(to);
  const nm=document.createElement('div');nm.className='fm-name';nm.textContent=item.para||'Synvia';body.appendChild(nm);
  const mg=document.createElement('div');mg.className='fm-msg';mg.textContent='“'+(item.msg||'')+'”';body.appendChild(mg);
  el.appendChild(body);   // sem a linha de "de ..." — assinatura fica de fora
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('in'));
  const hold=Math.min(11000,Math.max(6000,(item.msg||'').length*70+3500));
  setTimeout(()=>{el.classList.add('out');el.classList.remove('in');setTimeout(()=>el.remove(),650);},hold);
}
// ---- tarja inferior: uma mensagem por vez (nunca sobrepõe) ----
let tarjaBusy=false;
function showTarja(item,destaque){
  if(isFotoItem(item)) return;
  const t=el('tarja'); if(!t) return;
  t.classList.remove('in');                    // fade-out do atual
  setTimeout(()=>{
    const tag=el('tjTag');
    if(destaque){tag.style.display='inline-block';tag.textContent=item.vencedor?'🏆 vencedor':'✨ ao vivo';}
    else{tag.style.display='none';}
    el('tjName').textContent=item.para||'Synvia';
    el('tjMsg').textContent='“'+(item.msg||'')+'”';
    t.classList.add('in');                      // fade-in do novo
  },450);
}
// ---- clean: foto assenta num quadro no canto (some depois, deixando o motion livre) ----
function cornerPhoto(src){
  if(!src) return;
  const el=document.createElement('div');el.className='corner-photo';
  const img=document.createElement('img');img.src=src;el.appendChild(img);
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('in'));
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),700);},16000);
}
// ---- takeover: elogio ao vivo / em destaque ----
async function deliverLive(item,kind){
  const gold=kind==='live';
  const isFoto=item.tipo==='foto'||!!item.fotoUrl||(typeof item.foto==='string'&&/^data:image/.test(item.foto));
  document.body.classList.add('live-on');liveWrap.classList.add('on');
  if(isFoto){
    livecard.style.display='none';livephoto.style.display='block';livephoto.classList.remove('in','out');
    lpImg.src=item.fotoUrl||item.foto||'';
    {const nf=(item.para||item.de||'').trim();
     if(nf){lpRibbon.textContent='📸 Foto de '+nf;lpRibbon.style.display='';}
     else{lpRibbon.textContent='';lpRibbon.style.display='none';}}  // anônimo: só a foto
    lpDe.textContent='';lpDe.style.display='none';   // nome vai em cima; anônimo sem texto
    lpTimer.style.transition='none';lpTimer.style.transform='scaleX(0)';
    await wait(40);livephoto.classList.add('in');
    confetti(gold);fireShow(gold);pop(gold);
    if(gold)setTimeout(()=>fireShow(true),820);
    const ms=CLEAN?5500:(gold?10000:8500);   // clean: momento no centro é curtinho, depois assenta no canto
    lpTimer.style.transition='transform '+ms+'ms linear';requestAnimationFrame(()=>{lpTimer.style.transform='scaleX(1)';});
    await wait(ms);
    if(CLEAN) cornerPhoto(item.fotoUrl||item.foto||'');   // assenta num quadro no canto (centro fica livre)
    livephoto.classList.add('out');liveWrap.classList.remove('on');
    await wait(560);document.body.classList.remove('live-on');livephoto.classList.remove('in');livephoto.style.display='none';
    await wait(220);return;
  }
  livephoto.style.display='none';livecard.style.display='block';
  livecard.classList.remove('in','out','tremor','feat');lvRibbon.classList.remove('feat');lvAva.classList.remove('pop');
  lvTimer.style.transition='none';lvTimer.style.transform='scaleX(0)';
  if(gold){lvRibbon.textContent='✨ Elogio ao vivo ✨';}
  else{livecard.classList.add('feat');lvRibbon.classList.add('feat');lvRibbon.textContent='💌 Recado em destaque';}
  if(item.vencedor){livecard.classList.remove('feat');lvRibbon.classList.remove('feat');lvRibbon.textContent='🏆 VENCEDOR 🏆';}
  lvEmoji.textContent=emojiFor(item.para);lvAva.style.background=corDe(item.para);
  lvName.textContent=item.para;lvChip.textContent=item.setor||'Synvia';
  lvMsg.textContent='“'+item.msg+'”';lvMsg.classList.toggle('short',item.msg.length<=70);lvDe.textContent=item.de||'';
  liveWrap.classList.add('on');
  await wait(40);livecard.classList.add('in');
  confetti(gold);fireShow(gold);pop(gold);
  if(gold){livecard.classList.add('tremor');setTimeout(()=>livecard.classList.remove('tremor'),650);}
  await wait(600);lvAva.classList.add('pop');pop(gold);
  if(gold)setTimeout(()=>fireShow(true),750);
  let ms=Math.min(11000,Math.max(5200,item.msg.length*72+3200));if(!gold)ms-=600;
  lvTimer.style.transition='transform '+ms+'ms linear';requestAnimationFrame(()=>{lvTimer.style.transform='scaleX(1)';});
  await wait(ms);
  livecard.classList.add('out');liveWrap.classList.remove('on');
  await wait(560);document.body.classList.remove('live-on');livecard.classList.remove('in');
  await wait(220);
}

(async function(){
  let csvRecords=await loadCSV();
  let idlePool=shuffle(csvRecords.filter(r=>r.msg.length<=170));if(!idlePool.length)idlePool=shuffle(csvRecords.slice());
  let idleIdx=0;const nextIdle=()=>idlePool.length?idlePool[(idleIdx++)%idlePool.length]:{para:'Arraiá da Synvia',setor:'Synvia',msg:'Viva o Arraiá! 🌽🔥',de:''};
  let total=csvRecords.length;
  const updCount=()=>{countEl.textContent='🤠 '+total+' recados';};
  updCount();
  function rebuildIdle(fbRecs){const m=new Map();csvRecords.forEach(r=>{if(r.para&&r.msg)m.set(r.id,r);});fbRecs.forEach(r=>{if(r.para&&r.msg)m.set(r.id,r);});const all=[...m.values()];total=all.length;updCount();let pool=all.filter(r=>r.msg.length<=170);if(!pool.length)pool=all;idlePool=shuffle(pool);idleIdx=0;}

  let db=null,queueArr=[];
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
    firebase.initializeApp(FB);db=firebase.database();
    db.ref(Q).on('value',s=>{const v=s.val()||{};queueArr=Object.keys(v).map(k=>Object.assign({key:k},v[k])).sort((a,b)=>(a.ts||0)-(b.ts||0));});
    db.ref(APROV).on('value',s=>{const v=s.val()||{};rebuildIdle(Object.keys(v).map(k=>recFromFB(v[k])));});
  }catch(e){console.warn('Firebase off — telão em rotação local.',e);}

  // preenche a caixa de mensagens
  if(!CLEAN){for(let i=0;i<3;i++){pushBubble(nextIdle());await wait(700);}}

  let busy=false,mode='';
  async function loop(){
    if(!busy){busy=true;
      try{
        if(db&&queueArr.length){
          const next=queueArr[0];
          const bigDestaque = isFotoItem(next) || next.vencedor;   // takeover grande SÓ pra foto e vencedor
          mode='live';
          if(bigDestaque){
            const kind=next.aoVivo?'live':'featured';
            db.ref(NP).set({tipo:next.tipo||'recado',para:next.para||'',setor:next.setor||'',msg:next.msg||'',de:next.de||'',fotoUrl:next.fotoUrl||'',aoVivo:!!next.aoVivo,ts:Date.now(),live:true});
            await deliverLive(next,kind);
            if(CLEAN)showTarja(next,true);else pushBubble(next,{destaque:true});   // assenta (chat) / tarja (clean)
            await db.ref(Q+'/'+next.key).remove();
            if(isFotoItem(next)){                     // depois da foto
              if(CLEAN){await wait(1500);}            // clean: libera o centro rapidinho
              else{ await wait(30000); pushBubble(nextIdle()); await wait(4000); }
            }
          } else {
            // recado comum despachado: entra no chat / flutua, sem tomar a tela
            if(CLEAN)showTarja(next,true);else pushBubble(next,{destaque:true});
            await db.ref(Q+'/'+next.key).remove();
            await wait(2500);
          }
        } else {
          if(db&&mode!=='idle'){db.ref(NP).set({idle:true,ts:Date.now()});mode='idle';}
          if(CLEAN){showTarja(nextIdle());await wait(7000);}
          else{pushBubble(nextIdle());await wait(6800);}
        }
      }catch(e){console.warn(e);}
      busy=false;}
    setTimeout(loop,80);
  }
  loop();
})();
</script>
