<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Moderação · Ao Vivo · Arraiá Synvia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --forest:#16352a;--green:#36a847;--yellow:#f4b81b;--orange:#e8590c;--cream:#f6f1df;
  --ink:#22201f;--ink-soft:#5b574f;--mist:#e6e3da;--danger:#c0392b;--gold:#e8a300;
  --font:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--ink);background:linear-gradient(180deg,#fbfaf5,#eef0e9);min-height:100vh;-webkit-font-smoothing:antialiased;}
.bar{position:sticky;top:0;z-index:20;background:var(--forest);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.bar h1{font-size:1.05rem;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:9px;}
.livedot{width:11px;height:11px;border-radius:50%;background:#4be07a;box-shadow:0 0 0 0 rgba(75,224,122,.6);animation:on 1.6s ease-out infinite;}
@keyframes on{0%{box-shadow:0 0 0 0 rgba(75,224,122,.6)}100%{box-shadow:0 0 0 9px rgba(75,224,122,0)}}
.conn{font-size:.78rem;font-weight:700;color:#bfe6c8;}
.bar .grow{flex:1;}
.exp{font-family:var(--font);font-size:.82rem;font-weight:800;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;background:var(--yellow);color:#3a2600;display:inline-flex;align-items:center;gap:7px;}
.exp:hover{filter:brightness(1.05);}
.exp.ghost{background:rgba(255,255,255,.14);color:#fff;}
.wrap{max-width:1200px;margin:0 auto;padding:18px 20px 80px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.tab{font-family:var(--font);font-size:.86rem;font-weight:800;cursor:pointer;border:1.5px solid var(--mist);background:#fff;color:var(--ink-soft);border-radius:999px;padding:9px 16px;display:inline-flex;align-items:center;gap:8px;}
.tab.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.tab .n{font-size:.76rem;background:rgba(0,0,0,.12);border-radius:999px;padding:1px 8px;font-weight:800;}
.tab.active .n{background:rgba(255,255,255,.22);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.empty{text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:1rem;}
.card{background:#fff;border:1px solid var(--mist);border-radius:16px;overflow:hidden;box-shadow:0 8px 24px -16px rgba(0,0,0,.4);display:flex;flex-direction:column;}
.card .head{display:flex;align-items:center;gap:10px;padding:13px 15px 0;}
.tag{font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap;}
.tag.recado{background:#e7f6ea;color:#1a6b30;}
.tag.foto{background:#fdeee2;color:#b84310;}
.st{margin-left:auto;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);}
.st.novo{color:var(--green);}
.st.standby{color:var(--gold);}
.st.aprovado{color:#2a7de1;}
.st.negado{color:var(--danger);}
.card .body{padding:11px 15px 14px;flex:1;}
.to{font-size:.78rem;color:var(--ink-soft);font-weight:700;}
.name{font-size:1.12rem;font-weight:800;line-height:1.2;}
.setor{display:inline-block;margin-top:6px;font-size:.72rem;font-weight:700;color:#fff;background:var(--green);border-radius:999px;padding:3px 10px;}
.msg{margin-top:10px;font-size:1rem;line-height:1.4;color:#2e2721;}
.meta{margin-top:11px;font-size:.78rem;color:var(--ink-soft);border-top:1px dashed var(--mist);padding-top:9px;display:flex;flex-direction:column;gap:2px;}
.meta b{color:var(--ink);}
.shot{width:100%;aspect-ratio:9/16;max-height:340px;object-fit:cover;background:#111;display:block;}
.acts{display:flex;gap:7px;padding:12px 13px;border-top:1px solid var(--mist);background:#fbfaf6;flex-wrap:wrap;}
.b{font-family:var(--font);font-size:.82rem;font-weight:800;cursor:pointer;border:1.5px solid var(--mist);background:#fff;color:var(--ink);border-radius:10px;padding:9px 12px;flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;}
.b:hover{filter:brightness(.98);}
.b.aprovar{background:var(--green);border-color:var(--green);color:#fff;}
.b.standby{background:#fff7e6;border-color:#f0d79a;color:#8a6400;}
.b.negar{background:#fff;border-color:#f0c6c1;color:var(--danger);}
.b.reativar{background:var(--forest);border-color:var(--forest);color:#fff;}
.b.small{flex:none;}
a.dl{font-size:.8rem;font-weight:800;color:var(--orange);text-decoration:none;}
a.dl:hover{text-decoration:underline;}
.card.mini .body{padding:8px 15px;}
.card.mini .name{font-size:.98rem;}
.card.mini .msg{font-size:.86rem;max-height:2.8em;overflow:hidden;}
.card.mini .shot{max-height:150px;}
.card.mini{opacity:.82;}
.note{font-size:.8rem;color:var(--ink-soft);background:#fff7e6;border:1px solid #f0d79a;border-radius:12px;padding:11px 14px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="bar">
  <h1><span class="livedot"></span> Moderação · Arraiá</h1>
  <span class="conn" id="conn">conectando…</span>
  <span class="grow"></span>
  <button class="exp" id="expCsv">⬇️ Exportar arquivo (CSV)</button>
  <button class="exp ghost" id="openTelao">🖥️ Abrir telão</button>
</div>
<div class="wrap">
  <div class="note" id="storageNote" style="display:none"></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-f="novo">Novos <span class="n" id="c-novo">0</span></button>
    <button class="tab" data-f="standby">Stand by <span class="n" id="c-standby">0</span></button>
    <button class="tab" data-f="aprovado">Aprovados <span class="n" id="c-aprovado">0</span></button>
    <button class="tab" data-f="negado">Negados <span class="n" id="c-negado">0</span></button>
    <button class="tab" data-f="todos">Todos <span class="n" id="c-todos">0</span></button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Nada por aqui ainda. 🌽</div>
</div>
<script>
const FIREBASE={apiKey:"AIzaSyAJ-pmFFidThLK1KV6A7cUJrmF0RXXHr2c",authDomain:"contagem-de-likes.firebaseapp.com",databaseURL:"https://contagem-de-likes-default-rtdb.firebaseio.com",projectId:"contagem-de-likes"};
const AOVIVO='telaoFesta/aovivo', QUEUE='telaoFesta/queue';
const $=id=>document.getElementById(id);
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
let db=null, items=[], filter='novo';
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

$('tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;filter=t.dataset.f;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));render();});
$('openTelao').onclick=()=>window.open('mural-da-festa.html','_blank');

(async function(){
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE);
    db=firebase.database();
    $('conn').textContent='ao vivo';
    db.ref(AOVIVO).on('value',s=>{const v=s.val()||{};items=Object.keys(v).map(k=>Object.assign({key:k},v[k])).sort((a,b)=>(b.ts||0)-(a.ts||0));counts();render();});
  }catch(e){console.error(e);$('conn').textContent='sem conexão';}
})();

function counts(){
  const c={novo:0,standby:0,aprovado:0,negado:0,todos:items.length};
  items.forEach(i=>{const st=i.status||'novo';if(c[st]!=null)c[st]++;});
  ['novo','standby','aprovado','negado','todos'].forEach(k=>$('c-'+k).textContent=c[k]);
}
function render(){
  const list=items.filter(i=>filter==='todos'?true:(i.status||'novo')===filter);
  $('empty').style.display=list.length?'none':'block';
  $('grid').innerHTML=list.map(card).join('');
  document.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>action(b.dataset.act,b.dataset.key));
}
function card(i){
  const st=i.status||'novo', mini=st==='standby';
  const quem=i.anon==='Não'&&i.remetente?('de '+esc(i.remetente)):(i.remetente?('de '+esc(i.remetente)+' · anônimo no telão'):'anônimo');
  const isFoto=i.tipo==='foto';
  const media=isFoto?`<img class="shot" src="${esc(i.fotoUrl||i.foto||'')}" alt="foto" />`:'';
  const corpo=isFoto
    ?`<div class="to">Foto pro telão</div>${i.fotoUrl?`<a class="dl" href="${esc(i.fotoUrl)}" target="_blank" rel="noopener">⬇️ Baixar foto (alta)</a>`:'<span class="dl" style="color:#b84310">só prévia — Storage off</span>'}`
    :`<div class="to">Para</div><div class="name">${esc(i.dest)||'—'}</div>${i.setor?`<span class="setor">${esc(i.setor)}</span>`:''}<div class="msg">"${esc(i.msg)}"</div>`;
  let acts='';
  if(st==='aprovado')acts=`<button class="b reativar" data-act="refila" data-key="${i.key}">↻ Mandar de novo</button><button class="b negar" data-act="negar" data-key="${i.key}">Arquivar</button>`;
  else if(st==='negado')acts=`<button class="b reativar" data-act="novo" data-key="${i.key}">↺ Reabrir</button>`;
  else if(st==='standby')acts=`<button class="b aprovar" data-act="aprovar" data-key="${i.key}">🖥️ Pro telão</button><button class="b reativar" data-act="novo" data-key="${i.key}">↺ Reativar</button>`;
  else acts=`<button class="b aprovar" data-act="aprovar" data-key="${i.key}">🖥️ Pro telão</button><button class="b standby" data-act="standby" data-key="${i.key}">⏸ Stand by</button><button class="b negar" data-act="negar" data-key="${i.key}">✕ Negar</button>`;
  return `<div class="card ${mini?'mini':''}">
    <div class="head"><span class="tag ${isFoto?'foto':'recado'}">${isFoto?'📸 Foto':'💌 Recado'}</span><span class="st ${st}">${st}</span></div>
    ${media}
    <div class="body">${corpo}
      <div class="meta"><span>Remetente: <b>${esc(i.remetente)||'não identificado'}</b></span><span>${esc(i.data)||''}</span></div>
    </div>
    <div class="acts">${acts}</div>
  </div>`;
}
async function action(act,key){
  const i=items.find(x=>x.key===key);if(!i)return;
  if(act==='standby')return db.ref(AOVIVO+'/'+key).update({status:'standby'});
  if(act==='negar')return db.ref(AOVIVO+'/'+key).update({status:'negado'});
  if(act==='novo')return db.ref(AOVIVO+'/'+key).update({status:'novo'});
  if(act==='aprovar'||act==='refila'){
    const q={tipo:i.tipo||'recado',aoVivo:true,ts:Date.now()};
    if(i.tipo==='foto'){q.fotoUrl=i.fotoUrl||'';q.foto=i.foto||'';q.para=i.remetente||'';q.de=i.remetente||'';}
    else{q.para=i.dest||'';q.setor=i.setor||'';q.msg=i.msg||'';q.de=(i.anon==='Não'?(i.remetente||''):'');}
    await db.ref(QUEUE).push(q);
    await db.ref(AOVIVO+'/'+key).update({status:'aprovado'});
  }
}
/* Exportar arquivo (CSV com tudo, pra recordação) */
$('expCsv').onclick=()=>{
  const cols=['Data','Tipo','Status','Para','Setor','Mensagem','Remetente','Anônimo no telão','Link da foto (alta)'];
  const rows=items.map(i=>[i.data||new Date(i.ts||0).toLocaleString('pt-BR'),i.tipo||'',i.status||'novo',i.dest||'',i.setor||'',i.msg||'',i.remetente||'',i.anon||'',i.fotoUrl||'']);
  const csv=[cols,...rows].map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='arraia-synvia-elogios.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);
};
</script>
</body>
</html>
